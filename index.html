<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Architect - Ultra Compact UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        body {
            background-color: #09090b;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .card-container {
            width: 375px;
            height: 525px;
            position: relative;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            flex-shrink: 0;
            user-select: none;
            transform: translateZ(0);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .template-layer {
            position: absolute;
            inset: 0;
            background-size: 100% 100%;
            z-index: 5;
            pointer-events: none;
        }

        .art-layer {
            position: absolute;
            top: 45px; left: 25px;
            width: 325px; height: 240px;
            background-size: cover;
            background-position: center;
            background-color: #f1f5f9;
            z-index: 1;
            border-radius: 4px;
        }

        /* Display field */
        .dynamic-field {
            position: absolute;
            z-index: 20;
            display: flex;
            align-items: center;
            line-height: 1.1;
            word-break: break-word;
            pointer-events: none;
            box-sizing: border-box;
            font-variant-ligatures: none;
            text-rendering: optimizeLegibility;
            padding: 2px 4px;
            white-space: pre-wrap;
        }
        .dynamic-field.align-left   { justify-content: flex-start; text-align: left; }
        .dynamic-field.align-center { justify-content: center;     text-align: center; }
        .dynamic-field.align-right  { justify-content: flex-end;   text-align: right; }

        /* Inline contenteditable editor */
        .inline-editor {
            position: absolute;
            z-index: 200;
            box-sizing: border-box;
            outline: 2px solid #f97316;
            border-radius: 3px;
            background: rgba(255,255,255,0.93);
            padding: 2px 4px;
            line-height: 1.1;
            word-break: break-word;
            white-space: pre-wrap;
            overflow: hidden;
            cursor: text;
        }
        .inline-editor.align-left   { text-align: left; }
        .inline-editor.align-center { text-align: center; }
        .inline-editor.align-right  { text-align: right; }

        /* Interaction / drag layer */
        .interaction-layer {
            position: absolute;
            inset: 0;
            z-index: 100;
            pointer-events: none;
        }

        .interaction-box {
            position: absolute;
            cursor: move;
            border: 1px dashed rgba(249,115,22,0.3);
            pointer-events: auto;
            transition: border-color 0.2s, background 0.2s;
        }
        .interaction-box.active-field {
            border: 2px solid #f97316 !important;
            background: rgba(249,115,22,0.08);
            z-index: 101;
        }


        .resize-handle {
            position: absolute;
            right: -5px; bottom: -5px;
            width: 14px; height: 14px;
            background: #f97316;
            border-radius: 2px;
            cursor: nwse-resize;
            z-index: 102;
        }

        .sidebar {
            width: 400px;
            background: #121214;
            border-left: 1px solid #27272a;
            height: 100vh;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }

        .profile-card {
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            transition: all 0.2s;
            position: relative;
            background: rgba(24,24,27,0.4);
        }
        .profile-card.active-profile {
            border-color: rgba(249,115,22,0.5);
            background: rgba(249,115,22,0.05);
        }

        .toolbar-btn {
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px;
            background: #27272a; border: 1px solid #3f3f46;
            font-size: 10px; font-weight: 700;
            transition: background 0.2s; cursor: pointer;
        }
        .toolbar-btn:hover { background: #3f3f46; }
        .toolbar-btn.active { background: #ea580c; border-color: #f97316; color: white; }

        .align-btn {
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px;
            background: #27272a; border: 1px solid #3f3f46;
            cursor: pointer; transition: background 0.2s;
            width: 24px; height: 24px;
        }
        .align-btn:hover { background: #3f3f46; }
        .align-btn.active { background: #ea580c; border-color: #f97316; }

        .switch { position: relative; display: inline-block; width: 28px; height: 14px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0;
            background-color: #3f3f46; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 10px; width: 10px;
            left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #f97316; }
        input:checked + .slider:before { transform: translateX(14px); }

        #exportOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .export-nudge { transform: translateY(-15px); }
    </style>
</head>
<body class="flex h-screen">

<div id="exportOverlay">
    <div class="text-center">
        <div class="w-16 h-16 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
        <h2 class="text-xl font-black text-white uppercase tracking-widest mb-2">Generating Assets</h2>
        <p id="exportProgress" class="text-zinc-500 text-xs font-bold uppercase tracking-widest">Processing 0 / 0</p>
    </div>
</div>

<main id="workspace" class="flex-1 flex flex-col items-center py-10 bg-[#0c0c0e] overflow-y-auto custom-scrollbar">

    <!-- Header -->
    <div class="w-full max-w-4xl px-8 mb-8 flex items-start justify-between">
        <div class="flex flex-col">
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter mb-1">Deck Architect</h1>
            <div class="flex items-center gap-4 mt-1">
                <div class="flex flex-col">
                    <span id="activeProfileDisplay" class="text-[11px] font-black text-orange-500 uppercase tracking-widest">Global Context</span>
                    <div class="text-[11px] font-black text-zinc-500 uppercase tracking-widest mt-0.5">
                        Scope: <span class="text-white" id="currentScopeText">Global</span>
                    </div>
                </div>
                <span class="w-1.5 h-1.5 rounded-full bg-zinc-800 self-center"></span>
                <button id="toggleEditBtn" class="text-[11px] font-black text-blue-400 uppercase tracking-widest hover:text-blue-300 transition-colors self-center">
                    Edit Layout
                </button>
            </div>
        </div>
    </div>

    <!-- Floating Toolbar -->
    <div id="formatToolbar" class="mb-8 px-3 py-2 bg-zinc-900/90 rounded-xl border border-zinc-800 flex items-center gap-3 hidden shadow-2xl backdrop-blur-md flex-wrap">

        <div class="flex flex-col pr-3 border-r border-zinc-800 shrink-0 gap-1">
            <div class="flex items-center gap-2">
                <div class="flex flex-col">
                    <span class="text-[7px] font-black text-zinc-500 uppercase tracking-widest leading-none mb-1">Style</span>
                    <div id="coordsBox" class="font-mono text-[8px] text-zinc-400 truncate max-w-[80px]">No selection</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="modeToggle">
                    <span class="slider"></span>
                </label>
            </div>
            <div id="modeHint" class="text-[7px] font-black uppercase tracking-widest text-blue-400">&#9654; Move mode — toggle Style for more</div>
        </div>

        <div class="flex flex-col shrink-0">
            <span class="text-[7px] font-black text-zinc-500 uppercase leading-none mb-1 tracking-widest">Target</span>
            <select id="savingScopeSelect" class="bg-zinc-950 border border-zinc-800 text-[9px] font-black text-orange-400 rounded-md px-1.5 py-0.5 outline-none focus:border-orange-500 transition-colors">
                <option value="global">GLOBAL</option>
                <option value="profile">PROFILE</option>
                <option value="card">CARD</option>
            </select>
        </div>

        <div id="styleControls" class="flex items-center gap-3 hidden border-l border-zinc-800 pl-3 flex-wrap">
            <div class="flex gap-0.5 shrink-0">
                <button id="btnBold"   class="toolbar-btn w-6 h-6">B</button>
                <button id="btnItalic" class="toolbar-btn w-6 h-6 italic font-serif">I</button>
            </div>
            <div class="flex items-center gap-1.5 shrink-0">
                <input type="range" id="fontSizeSlider" min="8" max="100" value="16" class="w-14 accent-orange-500">
                <span id="fontSizeDisplay" class="text-[9px] font-mono font-bold text-zinc-300 w-6 text-center">16</span>
            </div>
            <div class="w-6 h-6 rounded border border-zinc-700 relative shrink-0 overflow-hidden" title="Font color">
                <input type="color" id="fontColorPicker" value="#000000" class="absolute -inset-2 w-10 h-10 bg-transparent border-none cursor-pointer">
            </div>
            <!-- Alignment -->
            <div class="flex gap-0.5 shrink-0 border-l border-zinc-800 pl-2">
                <button id="btnAlignLeft"   class="align-btn" title="Align Left">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="2"   width="10" height="1.2" rx="0.6" fill="currentColor"/><rect x="1" y="5.4" width="7"  height="1.2" rx="0.6" fill="currentColor"/><rect x="1" y="8.8" width="10" height="1.2" rx="0.6" fill="currentColor"/></svg>
                </button>
                <button id="btnAlignCenter" class="align-btn" title="Align Center">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1"   y="2"   width="10" height="1.2" rx="0.6" fill="currentColor"/><rect x="2.5" y="5.4" width="7"  height="1.2" rx="0.6" fill="currentColor"/><rect x="1"   y="8.8" width="10" height="1.2" rx="0.6" fill="currentColor"/></svg>
                </button>
                <button id="btnAlignRight"  class="align-btn" title="Align Right">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="2"   width="10" height="1.2" rx="0.6" fill="currentColor"/><rect x="4" y="5.4" width="7"  height="1.2" rx="0.6" fill="currentColor"/><rect x="1" y="8.8" width="10" height="1.2" rx="0.6" fill="currentColor"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Card Preview -->
    <div id="cardPreview" class="card-container">
        <div id="artLayer" class="art-layer"></div>
        <div id="templateLayer" class="template-layer"></div>
        <div id="fieldsContainer" class="absolute inset-0"></div>
        <div id="interactionLayer" class="interaction-layer"></div>
        <!-- inline-editor div injected here by JS -->
    </div>

    <div class="flex items-center gap-4 mt-10">
        <button id="downloadCurrentBtn" class="bg-zinc-800 hover:bg-zinc-700 text-white px-8 py-3 rounded-xl font-black text-[11px] uppercase tracking-widest border border-zinc-700 transition-all">
            Export Current
        </button>
        <button id="exportAllBtn" class="bg-orange-600 hover:bg-orange-500 text-white px-10 py-3 rounded-xl font-black text-[11px] uppercase tracking-widest transition-all">
            Export Full Deck
        </button>
    </div>
</main>

<aside class="sidebar flex flex-col">
    <div class="p-6 space-y-10 flex-1 overflow-y-auto custom-scrollbar">

        <section>
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Database</h3>
                <div id="dataScopeLabel" class="text-[8px] font-black bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded uppercase tracking-tighter">No File</div>
            </div>
            <div id="dropZoneData" class="border-2 border-dashed border-zinc-800 p-6 rounded-xl text-center cursor-pointer hover:border-orange-500 transition-colors bg-zinc-900/30">
                <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" class="hidden">
                <p class="text-xs text-zinc-400 font-bold uppercase tracking-tighter" id="fileNameLabel">Upload CSV/Excel</p>
            </div>
        </section>

        <section>
            <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-4">Frame Assets</h3>
            <div id="dropZoneTemplates" class="border-2 border-dashed border-zinc-800 p-4 rounded-xl text-center cursor-pointer hover:border-orange-500 mb-4 bg-zinc-900/30">
                <input type="file" id="templateFiles" accept="image/*" multiple class="hidden">
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Add Templates</p>
            </div>
            <div id="templateLibrary" class="grid grid-cols-4 gap-2"></div>
        </section>

        <section id="profilesSection">
            <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-4">Profile Logic</h3>
            <select id="triggerCol" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-xs text-orange-400 outline-none mb-4 hidden">
                <option value="">Select Trigger Column</option>
            </select>
            <div id="profileContainer" class="space-y-4"></div>
        </section>

        <section>
            <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-4">Layer List</h3>
            <div id="columnList" class="space-y-2"></div>
        </section>
    </div>

    <div class="p-6 bg-zinc-900 border-t border-zinc-800">
        <select id="cardSelector" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-xs text-white mb-4 outline-none"></select>
        <div class="grid grid-cols-2 gap-3">
            <button id="prevBtn" class="bg-zinc-800 py-3 rounded-xl text-[10px] font-black border border-zinc-700 hover:text-white transition-colors">PREV</button>
            <button id="nextBtn" class="bg-zinc-800 py-3 rounded-xl text-[10px] font-black border border-zinc-700 hover:text-white transition-colors">NEXT</button>
        </div>
    </div>
</aside>

<script>
    // ── State ──────────────────────────────────────────────────────────────────
    let data = [];
    let headers = [];
    let fieldConfigs = {};
    let profileSettings = {};
    let profileStyleOverrides = {};
    let cardOverrides = {};
    let cardTextOverrides = {};   // { [cardIndex]: { [header]: string } }
    let templateAssets = {};
    let currentIndex = 0;
    let isEditMode = false;
    let isStyleMode = false;
    let selectedHeader = null;
    let globalTemplateName = null;
    let activeEditor = null;      // the contenteditable div currently open
    let dragInfo = { active: false, type: null, header: null, startX: 0, startY: 0, initialConfig: null };

    // ── DOM refs ───────────────────────────────────────────────────────────────
    const cardPreview      = document.getElementById('cardPreview');
    const fieldsContainer  = document.getElementById('fieldsContainer');
    const interactionLayer = document.getElementById('interactionLayer');
    const columnList       = document.getElementById('columnList');
    const triggerColSelect = document.getElementById('triggerCol');
    const profileContainer = document.getElementById('profileContainer');
    const scopeSelect      = document.getElementById('savingScopeSelect');
    const currentScopeText = document.getElementById('currentScopeText');

    // ── Helpers ────────────────────────────────────────────────────────────────
    function getProfileVal() {
        const t = triggerColSelect.value;
        return t ? String(data[currentIndex]?.[t] || '').trim() : null;
    }

    function getEffectiveText(h) {
        if (cardTextOverrides[currentIndex]?.[h] !== undefined) return cardTextOverrides[currentIndex][h];
        return data[currentIndex]?.[h] ?? '';
    }

    function getConfigByScope(h) {
        const pVal = getProfileVal();
        if (cardOverrides[currentIndex]?.[h])         return cardOverrides[currentIndex][h];
        if (pVal && profileStyleOverrides[pVal]?.[h]) return profileStyleOverrides[pVal][h];
        return fieldConfigs[h];
    }

    function getVisibilityByScope(h) {
        const pVal = getProfileVal();
        if (cardOverrides[currentIndex]?.[h]?.visible !== undefined) return cardOverrides[currentIndex][h].visible;
        if (pVal && profileSettings[pVal]?.fields?.[h] !== undefined) return profileSettings[pVal].fields[h];
        return fieldConfigs[h].visible;
    }

    function updateScopeText() {
        if (isEditMode) {
            const v = scopeSelect.value;
            currentScopeText.textContent = v.charAt(0).toUpperCase() + v.slice(1);
            return;
        }
        const pVal = getProfileVal();
        if (cardOverrides[currentIndex] && Object.keys(cardOverrides[currentIndex]).length > 0) { currentScopeText.textContent = 'Card'; return; }
        if (pVal) {
            const hasV = profileSettings[pVal]?.fields && Object.keys(profileSettings[pVal].fields).length > 0;
            const hasS = profileStyleOverrides[pVal] && Object.keys(profileStyleOverrides[pVal]).length > 0;
            if (hasV || hasS) { currentScopeText.textContent = 'Profile'; return; }
        }
        currentScopeText.textContent = 'Global';
    }

    // ── Inline on-card editor ─────────────────────────────────────────────────
    function openInlineEditor(header) {
        closeInlineEditor(true);

        const conf = getConfigByScope(header);
        const alignment = conf.textAlign || 'center';

        const ed = document.createElement('div');
        ed.contentEditable = 'true';
        ed.spellcheck = false;
        ed.dataset.header = header;

        ed.style.position    = 'absolute';
        ed.style.zIndex      = '200';
        ed.style.top         = conf.top + 'px';
        ed.style.left        = conf.left + 'px';
        ed.style.width       = conf.width + 'px';
        ed.style.minHeight   = conf.height + 'px';
        ed.style.fontSize    = conf.fontSize + 'px';
        ed.style.fontWeight  = String(conf.fontWeight);
        ed.style.color       = conf.color;
        ed.style.fontStyle   = conf.fontStyle || 'normal';
        ed.style.fontFamily  = "'Inter', sans-serif";
        ed.style.textAlign   = alignment;
        ed.style.lineHeight  = '1.1';
        ed.style.wordBreak   = 'break-word';
        ed.style.whiteSpace  = 'pre-wrap';
        ed.style.boxSizing   = 'border-box';
        ed.style.padding     = '2px 4px';
        ed.style.outline     = '2px solid #f97316';
        ed.style.borderRadius = '3px';
        ed.style.background  = 'rgba(255,255,255,0.93)';
        ed.style.cursor      = 'text';

        ed.textContent = getEffectiveText(header);

        ed.addEventListener('input', () => {
            if (!cardTextOverrides[currentIndex]) cardTextOverrides[currentIndex] = {};
            cardTextOverrides[currentIndex][header] = ed.textContent;
            const display = fieldsContainer.querySelector('[data-field="' + header + '"]');
            if (display) display.textContent = ed.textContent;
            updateColumnUI();
        });

        ed.addEventListener('keydown', (e) => {
            if (e.key === 'Escape')               { closeInlineEditor(false); e.preventDefault(); }
            if (e.key === 'Enter' && !e.shiftKey) { closeInlineEditor(true);  e.preventDefault(); }
            e.stopPropagation();
        });

        ed.addEventListener('blur', () => {
            setTimeout(() => { if (activeEditor) closeInlineEditor(true); }, 200);
        });

        cardPreview.appendChild(ed);
        activeEditor = ed;

        ed.focus();
        try {
            const range = document.createRange();
            range.selectNodeContents(ed);
            range.collapse(false);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        } catch(err) {}
    }
    function closeInlineEditor(save) {
        if (!activeEditor) return;
        const header = activeEditor.dataset.header;
        if (save && header) {
            const span = activeEditor.querySelector('span');
            const txt = span ? span.textContent : activeEditor.textContent;
            if (!cardTextOverrides[currentIndex]) cardTextOverrides[currentIndex] = {};
            cardTextOverrides[currentIndex][header] = txt;
        }
        activeEditor.remove();
        activeEditor = null;
        render();
    }

    // ── Alignment ──────────────────────────────────────────────────────────────
    function saveAlignChange(alignment) {
        saveStyleChange('textAlign', alignment);
        updateAlignButtons(alignment);
        if (activeEditor) {
            activeEditor.className = `inline-editor align-${alignment}`;
        }
    }

    function updateAlignButtons(alignment) {
        document.getElementById('btnAlignLeft').classList.toggle('active',   alignment === 'left');
        document.getElementById('btnAlignCenter').classList.toggle('active', alignment === 'center');
        document.getElementById('btnAlignRight').classList.toggle('active',  alignment === 'right');
    }

    document.getElementById('btnAlignLeft').onclick   = () => saveAlignChange('left');
    document.getElementById('btnAlignCenter').onclick = () => saveAlignChange('center');
    document.getElementById('btnAlignRight').onclick  = () => saveAlignChange('right');

    // ── Event wiring ───────────────────────────────────────────────────────────
    document.getElementById('dropZoneData').onclick      = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange        = (e) => processDataFile(e.target.files[0]);
    document.getElementById('dropZoneTemplates').onclick = () => document.getElementById('templateFiles').click();
    document.getElementById('templateFiles').onchange    = (e) => handleTemplates(e.target.files);
    document.getElementById('prevBtn').onclick           = () => { if (currentIndex > 0) { currentIndex--; render(); } };
    document.getElementById('nextBtn').onclick           = () => { if (currentIndex < data.length - 1) { currentIndex++; render(); } };
    document.getElementById('cardSelector').onchange    = (e) => { currentIndex = parseInt(e.target.value); render(); };
    document.getElementById('downloadCurrentBtn').onclick = downloadCurrent;
    document.getElementById('exportAllBtn').onclick       = exportAllCards;

    document.getElementById('toggleEditBtn').onclick = () => {
        isEditMode = !isEditMode;
        closeInlineEditor(true);
        document.getElementById('formatToolbar').classList.toggle('hidden', !isEditMode);
        document.getElementById('toggleEditBtn').textContent = isEditMode ? 'Exit Editor' : 'Edit Layout';
        if (!isEditMode) { selectedHeader = null; isStyleMode = false; document.getElementById('modeToggle').checked = false; }
        else { scopeSelect.value = 'global'; }
        render();
    };

    document.getElementById('modeToggle').onchange = (e) => { isStyleMode = e.target.checked; updateToolbarUI(); };
    scopeSelect.onchange    = () => { updateScopeText(); render(); };
    triggerColSelect.onchange = () => { render(); };

    // ── Data loading ───────────────────────────────────────────────────────────
    async function processDataFile(file) {
        if (!file) return;
        document.getElementById('fileNameLabel').textContent = file.name;
        const reader = new FileReader();
        reader.onload = (e) => {
            const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
            data = json.filter(row => Object.values(row).join('').trim().length > 0);
            headers = Object.keys(json[0]);
            document.getElementById('dataScopeLabel').textContent = `${headers.length} COLUMNS`;

            triggerColSelect.innerHTML = '<option value="">(No Profile Logic)</option>';
            headers.forEach(h => {
                const opt = document.createElement('option'); opt.value = h; opt.textContent = h;
                triggerColSelect.appendChild(opt);
            });
            triggerColSelect.classList.remove('hidden');

            headers.forEach((h, i) => {
                if (h.toLowerCase().match(/art|image|template/)) return;
                if (!fieldConfigs[h]) fieldConfigs[h] = {
                    visible: true, top: 60 + i * 60, left: 25, width: 325, height: 45,
                    fontSize: 16, fontWeight: 700, color: '#000000', fontStyle: 'normal', textAlign: 'center'
                };
            });
            populateSelector();
            render();
        };
        reader.readAsArrayBuffer(file);
    }

    function populateSelector() {
        const sel = document.getElementById('cardSelector');
        sel.innerHTML = '';
        data.forEach((row, i) => {
            const name = Object.values(row)[0] || `Card ${i+1}`;
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = `${i+1}: ${name}`;
            sel.appendChild(opt);
        });
    }

    function handleTemplates(files) {
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                templateAssets[file.name] = ev.target.result;
                if (!globalTemplateName) globalTemplateName = file.name;
                updateTemplateLibrary();
            };
            reader.readAsDataURL(file);
        });
    }

    function updateTemplateLibrary() {
        const lib = document.getElementById('templateLibrary');
        lib.innerHTML = '';
        Object.keys(templateAssets).forEach(name => {
            const wrapper = document.createElement('div');
            wrapper.className = `cursor-pointer rounded border-2 overflow-hidden ${globalTemplateName === name ? 'border-orange-500' : 'border-zinc-800'}`;
            wrapper.onclick = () => { globalTemplateName = name; render(); updateTemplateLibrary(); };
            wrapper.innerHTML = `<img src="${templateAssets[name]}" class="w-full aspect-[2.5/3.5] object-cover">`;
            lib.appendChild(wrapper);
        });
        render();
    }

    // ── Render ─────────────────────────────────────────────────────────────────
    function render(forExport = false) {
        fieldsContainer.innerHTML = '';
        interactionLayer.innerHTML = '';

        if (data.length === 0) return;

        const row = data[currentIndex];
        const pVal = getProfileVal() || '';

        document.getElementById('activeProfileDisplay').textContent = pVal ? `Profile: ${pVal}` : 'Global Context';

        let finalTemplateName = globalTemplateName;
        if (pVal && profileSettings[pVal]?.frame) finalTemplateName = profileSettings[pVal].frame;
        const finalTemplate = templateAssets[finalTemplateName];
        document.getElementById('templateLayer').style.backgroundImage = finalTemplate ? `url('${finalTemplate}')` : 'none';

        const artCol = headers.find(h => h.toLowerCase().match(/art|image/));
        document.getElementById('artLayer').style.backgroundImage = (artCol && row[artCol]) ? `url('${row[artCol]}')` : 'none';

        headers.forEach(h => {
            if (h.toLowerCase().match(/art|image|template/)) return;
            if (!getVisibilityByScope(h)) return;

            const conf = getConfigByScope(h);
            const alignment = conf.textAlign || 'center';

            // Display div (hidden behind editor when editing)
            const div = document.createElement('div');
            div.className = `dynamic-field align-${alignment}`;
            div.dataset.field = h;
            if (forExport) div.classList.add('export-nudge');
            div.style.cssText = `top:${conf.top}px;left:${conf.left}px;width:${conf.width}px;height:${conf.height}px;font-size:${conf.fontSize}px;font-weight:${conf.fontWeight};color:${conf.color};font-style:${conf.fontStyle||'normal'};`;
            div.textContent = getEffectiveText(h);
            fieldsContainer.appendChild(div);

            // Interaction box (edit mode only)
            if (isEditMode && !forExport) {
                const interact = document.createElement('div');
                interact.className = `interaction-box ${selectedHeader === h ? 'active-field' : ''}`;
                interact.style.cssText = `top:${conf.top}px;left:${conf.left}px;width:${conf.width}px;height:${conf.height}px;`;
                interact.setAttribute('data-header', h);

                if (selectedHeader === h) {
                    const resizer = document.createElement('div');
                    resizer.className = 'resize-handle';
                    resizer.setAttribute('data-type', 'resize');
                    interact.appendChild(resizer);
                    document.getElementById('coordsBox').textContent = `${h}: ${conf.left}, ${conf.top}`;
                }
                interactionLayer.appendChild(interact);
            }
        });

        if (!forExport) {
            updateColumnUI();
            updateProfileUI();
            updateScopeText();
        }
    }

    // ── Profile UI ─────────────────────────────────────────────────────────────
    function updateProfileUI() {
        const trigger = triggerColSelect.value;
        if (!trigger) { profileContainer.innerHTML = ''; return; }

        const uniqueValues = [...new Set(data.map(row => String(row[trigger] || '').trim()))].filter(Boolean);
        const currentCardPVal = String(data[currentIndex][trigger] || '').trim();
        profileContainer.innerHTML = '';

        uniqueValues.forEach(val => {
            if (!profileSettings[val]) profileSettings[val] = { frame: '', fields: {} };
            const settings = profileSettings[val];
            const isActive = val === currentCardPVal;
            const card = document.createElement('div');
            card.className = `profile-card ${isActive ? 'active-profile' : ''}`;

            let frameOptions = '<option value="">Default Frame</option>';
            Object.keys(templateAssets).forEach(name => {
                frameOptions += `<option value="${name}" ${settings.frame === name ? 'selected' : ''}>${name}</option>`;
            });

            card.innerHTML = `
                <div class="flex items-center justify-between mb-4">
                    <div class="flex flex-col">
                        <span class="text-[7px] font-black text-zinc-500 uppercase tracking-widest leading-none mb-1">Profile Name</span>
                        <div class="text-[11px] font-black text-white uppercase tracking-tighter">${val}</div>
                    </div>
                    ${isActive ? '<div class="text-[7px] font-black bg-orange-600 text-white px-2 py-0.5 rounded tracking-widest">ACTIVE</div>' : ''}
                </div>
                <div class="mb-3">
                    <label class="text-[8px] font-black text-zinc-500 uppercase block mb-1">Frame Reference</label>
                    <select data-profile="${val}" class="profile-frame-select w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-[10px] text-orange-400 outline-none">
                        ${frameOptions}
                    </select>
                </div>
                <div class="mt-4 border-t border-zinc-800 pt-3 space-y-2">
                    <span class="text-[8px] font-black text-zinc-500 uppercase block mb-2">Layer Overrides</span>
                    ${headers.map(h => {
                        if (h.toLowerCase().match(/art|image|template/)) return '';
                        const isVisible = settings.fields[h] !== undefined ? settings.fields[h] : fieldConfigs[h].visible;
                        return `<div class="flex items-center justify-between">
                            <span class="text-[9px] text-zinc-400 font-bold uppercase tracking-wider">${h}</span>
                            <input type="checkbox" data-profile="${val}" data-header="${h}" ${isVisible ? 'checked' : ''} class="profile-field-toggle accent-orange-500 w-3 h-3">
                        </div>`;
                    }).join('')}
                </div>`;

            card.querySelector('.profile-frame-select').onchange = (e) => { profileSettings[val].frame = e.target.value; render(); };
            card.querySelectorAll('.profile-field-toggle').forEach(chk => {
                chk.onchange = (e) => { profileSettings[val].fields[e.target.getAttribute('data-header')] = e.target.checked; render(); };
            });
            profileContainer.appendChild(card);
        });
    }

    // ── Column UI ──────────────────────────────────────────────────────────────
    function updateColumnUI() {
        columnList.innerHTML = '';
        headers.forEach(h => {
            if (h.toLowerCase().match(/art|image|template/)) return;
            const isVisible = getVisibilityByScope(h);
            const hasTextOverride = cardTextOverrides[currentIndex]?.[h] !== undefined;
            const item = document.createElement('div');
            item.className = `flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all ${selectedHeader === h ? 'bg-zinc-800 border border-zinc-700' : 'bg-zinc-900/50 border border-transparent'}`;
            item.onclick = () => { selectedHeader = h; render(); updateToolbarUI(); };
            item.innerHTML = `
                <span class="text-[10px] font-bold ${selectedHeader === h ? 'text-white' : 'text-zinc-500'} uppercase flex items-center gap-1">
                    ${h}
                    ${hasTextOverride ? '<span class="text-[7px] text-orange-400 font-black bg-orange-500/10 px-1 rounded">EDITED</span>' : ''}
                </span>
                <input type="checkbox" ${isVisible ? 'checked' : ''} class="accent-orange-500 col-vis-toggle">`;

            item.querySelector('.col-vis-toggle').onclick = (e) => {
                e.stopPropagation();
                const newVal = e.target.checked;
                const targetScope = scopeSelect.value;
                const pVal = getProfileVal();
                if (targetScope === 'card') {
                    if (!cardOverrides[currentIndex]) cardOverrides[currentIndex] = {};
                    if (!cardOverrides[currentIndex][h]) cardOverrides[currentIndex][h] = JSON.parse(JSON.stringify(getConfigByScope(h)));
                    cardOverrides[currentIndex][h].visible = newVal;
                } else if (targetScope === 'profile' && pVal) {
                    if (!profileSettings[pVal].fields) profileSettings[pVal].fields = {};
                    profileSettings[pVal].fields[h] = newVal;
                } else {
                    fieldConfigs[h].visible = newVal;
                }
                render();
            };
            columnList.appendChild(item);
        });
    }

    // ── Toolbar UI ─────────────────────────────────────────────────────────────
    function updateToolbarUI() {
        const styleControls = document.getElementById('styleControls');
        if (isEditMode && isStyleMode && selectedHeader) {
            styleControls.classList.remove('hidden');
            const conf = getConfigByScope(selectedHeader);
            document.getElementById('fontSizeSlider').value = conf.fontSize;
            document.getElementById('fontSizeDisplay').textContent = `${conf.fontSize}`;
            document.getElementById('fontColorPicker').value = conf.color;
            updateAlignButtons(conf.textAlign || 'center');
        } else {
            styleControls.classList.add('hidden');
        }
        // Update mode hint label under the toggle
        const hint = document.getElementById('modeHint');
        if (hint) {
            if (isStyleMode) {
                hint.textContent = '✦ Style mode — drag, resize, or double-click to edit';
                hint.style.color = '#f97316';
            } else {
                hint.textContent = '▶ Move mode — toggle Style for more options';
                hint.style.color = '#60a5fa';
            }
        }
        updateScopeText();
    }

    // ── Drag / resize ──────────────────────────────────────────────────────────

    // Separate dblclick handler — only active in style mode
    interactionLayer.addEventListener('dblclick', (e) => {
        if (!isEditMode || !isStyleMode) return;
        const target = e.target.closest('.interaction-box');
        if (!target) return;
        const type = e.target.getAttribute('data-type');
        if (type === 'resize') return;
        const header = target.getAttribute('data-header');
        selectedHeader = header;
        dragInfo.active = false;
        openInlineEditor(header);
    });

    interactionLayer.addEventListener('pointerdown', (e) => {
        if (!isEditMode) return;
        const target = e.target.closest('.interaction-box');
        if (!target) {
            selectedHeader = null;
            closeInlineEditor(true);
            render();
            updateToolbarUI();
            return;
        }

        const header = target.getAttribute('data-header');
        const type = e.target.getAttribute('data-type') === 'resize' ? 'resize' : 'drag';

        // Update selected highlight without full re-render so dblclick still works
        if (selectedHeader !== header) {
            interactionLayer.querySelectorAll('.interaction-box').forEach(b => {
                b.classList.toggle('active-field', b.getAttribute('data-header') === header);
            });
            // Add resize handle to active box
            const activeBox = interactionLayer.querySelector('.interaction-box.active-field');
            if (activeBox && !activeBox.querySelector('.resize-handle')) {
                const resizer = document.createElement('div');
                resizer.className = 'resize-handle';
                resizer.setAttribute('data-type', 'resize');
                activeBox.appendChild(resizer);
            }
            selectedHeader = header;
            updateToolbarUI();
        }

        if (isStyleMode && type === 'drag') return;

        const currentConf = getConfigByScope(header);
        dragInfo = { active: true, type, header, startX: e.clientX, startY: e.clientY, initialConfig: JSON.parse(JSON.stringify(currentConf)) };
        interactionLayer.setPointerCapture(e.pointerId);
    });

    interactionLayer.addEventListener('pointermove', (e) => {
        if (!dragInfo.active) return;
        const targetScope = scopeSelect.value;
        const pVal = getProfileVal();
        let ts;
        if (targetScope === 'card') {
            if (!cardOverrides[currentIndex]) cardOverrides[currentIndex] = {};
            if (!cardOverrides[currentIndex][dragInfo.header]) cardOverrides[currentIndex][dragInfo.header] = JSON.parse(JSON.stringify(dragInfo.initialConfig));
            ts = cardOverrides[currentIndex][dragInfo.header];
        } else if (targetScope === 'profile' && pVal) {
            if (!profileStyleOverrides[pVal]) profileStyleOverrides[pVal] = {};
            if (!profileStyleOverrides[pVal][dragInfo.header]) profileStyleOverrides[pVal][dragInfo.header] = JSON.parse(JSON.stringify(dragInfo.initialConfig));
            ts = profileStyleOverrides[pVal][dragInfo.header];
        } else { ts = fieldConfigs[dragInfo.header]; }

        const dx = e.clientX - dragInfo.startX;
        const dy = e.clientY - dragInfo.startY;
        if (dragInfo.type === 'drag') {
            ts.top  = Math.round(dragInfo.initialConfig.top  + dy);
            ts.left = Math.round(dragInfo.initialConfig.left + dx);
        } else {
            ts.width  = Math.max(10, Math.round(dragInfo.initialConfig.width  + dx));
            ts.height = Math.max(10, Math.round(dragInfo.initialConfig.height + dy));
        }
        render();
    });

    interactionLayer.addEventListener('pointerup', (e) => {
        if (dragInfo.active) { dragInfo.active = false; interactionLayer.releasePointerCapture(e.pointerId); render(); }
    });

    // ── Style change helper ────────────────────────────────────────────────────
    function saveStyleChange(key, value) {
        if (!selectedHeader) return;
        const targetScope = scopeSelect.value;
        const pVal = getProfileVal();
        let target;
        if (targetScope === 'card') {
            if (!cardOverrides[currentIndex]) cardOverrides[currentIndex] = {};
            if (!cardOverrides[currentIndex][selectedHeader]) cardOverrides[currentIndex][selectedHeader] = JSON.parse(JSON.stringify(getConfigByScope(selectedHeader)));
            target = cardOverrides[currentIndex][selectedHeader];
        } else if (targetScope === 'profile' && pVal) {
            if (!profileStyleOverrides[pVal]) profileStyleOverrides[pVal] = {};
            if (!profileStyleOverrides[pVal][selectedHeader]) profileStyleOverrides[pVal][selectedHeader] = JSON.parse(JSON.stringify(getConfigByScope(selectedHeader)));
            target = profileStyleOverrides[pVal][selectedHeader];
        } else { target = fieldConfigs[selectedHeader]; }
        target[key] = value;
        render();
    }

    document.getElementById('fontSizeSlider').oninput = (e) => {
        document.getElementById('fontSizeDisplay').textContent = e.target.value;
        saveStyleChange('fontSize', parseInt(e.target.value));
    };
    document.getElementById('fontColorPicker').oninput = (e) => saveStyleChange('color', e.target.value);
    document.getElementById('btnBold').onclick = () => {
        const conf = getConfigByScope(selectedHeader);
        saveStyleChange('fontWeight', conf.fontWeight === 700 ? 400 : 700);
    };
    document.getElementById('btnItalic').onclick = () => {
        const conf = getConfigByScope(selectedHeader);
        saveStyleChange('fontStyle', conf.fontStyle === 'italic' ? 'normal' : 'italic');
    };

    // ── Export ─────────────────────────────────────────────────────────────────
    async function captureCard() {
        closeInlineEditor(true);
        render(true);
        const card = document.getElementById('cardPreview');
        await new Promise(r => setTimeout(r, 120));
        const canvas = await html2canvas(card, {
            scale: 4, useCORS: true, allowTaint: true,
            backgroundColor: null, logging: false,
            foreignObjectRendering: false, imageTimeout: 15000,
        });
        render(false);
        return canvas;
    }

    async function downloadCurrent() {
        if (data.length === 0) return;
        const originalMode = isEditMode;
        isEditMode = false;
        const canvas = await captureCard();
        const link = document.createElement('a');
        const name = Object.values(data[currentIndex])[0] || `card_${currentIndex}`;
        link.download = `${name}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        isEditMode = originalMode;
        render();
    }

    async function exportAllCards() {
        if (data.length === 0) return;
        const originalIndex = currentIndex;
        const zip = new JSZip();
        document.getElementById('exportOverlay').style.display = 'flex';
        for (let i = 0; i < data.length; i++) {
            currentIndex = i;
            const canvas = await captureCard();
            const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
            const cardName = Object.values(data[i])[0] || `card_${i}`;
            zip.file(`${i+1}_${cardName}.png`, blob);
            document.getElementById('exportProgress').textContent = `Processing ${i+1} / ${data.length}`;
        }
        const content = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = 'deck_export.zip';
        link.click();
        document.getElementById('exportOverlay').style.display = 'none';
        currentIndex = originalIndex;
        render();
    }
</script>
</body>
</html>
